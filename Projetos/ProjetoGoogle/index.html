<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <p class="head-p">Imagens</p>
        <p class="head-p">Gmail</p>
        <p><img width="30" height="30"
                src="https://img.icons8.com/external-others-inmotus-design/67/external-Menu-8-bits-others-inmotus-design.png"
                alt="external-Menu-8-bits-others-inmotus-design" /></p>
        <button class="btn"><span id="content-button">Entrar</span></button>
    </header>

    <main>
        <div class="search-container">
            <img class="google-name"
                src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/2560px-Google_2015_logo.svg.png"
                alt="">
            <input class="pesquisa" type="text">
            <div class="decore">
                <div class="decore-lupa"><img class="lupa" width="30" height="30"
                        src="https://img.icons8.com/ios/50/search--v1.png" alt="search--v1" />
                </div>
                <div class="others">
                    <img class="keyboar" width="30" height="30" src="https://img.icons8.com/sf-regular/48/keyboard.png"
                        alt="keyboard" />
                    <img class="mic" width="30" height="30" src="https://img.icons8.com/ios/50/microphone.png"
                        alt="microphone" />
                    <img class="lens" width="30" height="30" src="https://img.icons8.com/color/48/google-lens.png"
                        alt="google-lens" />
                </div>
            </div>
        </div>
    </main>
</body>

</html>
